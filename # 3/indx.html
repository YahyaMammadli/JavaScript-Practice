<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Employee Dashboard</h1>
        </header>

        <div class="controls">
            <button id="showAll">Show All</button>
            <button id="btn1">Remote</button>
            <button id="btn2">Experience &gt; 3</button>
            <button id="btn3">Web Development</button>
            <button id="btn4">Has React</button>
            <button id="btn5">Experience ↑</button>
            <button id="btn6">Experience ↓</button>
            <button id="btn7">Exp ≥ 4, by name</button>
            <button id="btn8">Backend Names</button>
            <button id="btn9">Max Experience</button>
            <button id="btn10">Skills &gt; 2</button>
            <button id="btn11">Dept → Exp</button>
            <button id="btn12">Unique Skills</button>
            <button id="btn13">Remote (exp ↓)</button>
            <button id="btn14">Group by Dept</button>
            <button id="btn15">Avg Experience</button>
            <button id="btn16">JS or Node.js</button>
        </div>

        <div id="list"></div>
    </div>

    <script src="script.js"></script>
    
</body>
</html>
